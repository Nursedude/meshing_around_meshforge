name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov httpx
          pip install -r meshing_around_clients/requirements.txt

      - name: Verify core imports
        run: |
          python -c "from meshing_around_clients.core.models import Node, Message; print('Core imports OK')"
          python -c "from meshing_around_clients.core.config import Config; print('Config imports OK')"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.11' || matrix.python-version == '3.9'
        run: |
          python -m pytest tests/ --cov=meshing_around_clients --cov-report=xml --cov-fail-under=65

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check formatting with black
        run: |
          black --check --diff meshing_around_clients/ tests/ mesh_client.py configure_bot.py --exclude '__pycache__|\.pyc'

      - name: Check imports with isort
        run: |
          isort --check-only --diff meshing_around_clients/ tests/

      - name: Lint with flake8
        run: |
          flake8 meshing_around_clients/ tests/ mesh_client.py configure_bot.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 meshing_around_clients/ tests/ mesh_client.py configure_bot.py --count --max-complexity=15 --max-line-length=120 --statistics

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python -m py_compile mesh_client.py
          python -m py_compile configure_bot.py
          find meshing_around_clients -name "*.py" -exec python -m py_compile {} \;

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]" pip-audit
          pip install -r meshing_around_clients/requirements.txt

      - name: Bandit SAST scan (HIGH severity — blocking)
        run: |
          bandit -r meshing_around_clients/ mesh_client.py configure_bot.py --severity-level high -f screen

      - name: Bandit SAST scan (MEDIUM+ — informational)
        if: always()
        run: |
          bandit -r meshing_around_clients/ mesh_client.py configure_bot.py --severity-level medium -f screen || true

      - name: pip-audit dependency scan (informational)
        if: always()
        run: |
          pip-audit --desc on 2>&1 || true

      - name: Check requirements.lock drift (informational)
        if: always()
        run: |
          pip freeze --all | grep -F '==' | sort > /tmp/current-lock.txt
          # Compare direct+transitive deps against committed lock file
          comm -23 <(grep -v '^#' meshing_around_clients/requirements.lock | grep -F '==' | sed 's/ *#.*//' | sort) <(sort /tmp/current-lock.txt) | head -20 && echo "Lock file check complete (missing packages shown above, if any)"

      - name: Generate SBOM (CycloneDX)
        if: always()
        run: |
          pip install cyclonedx-bom 2>/dev/null || pip install cyclonedx-py 2>/dev/null || true
          cyclonedx-py environment -o sbom.json 2>/dev/null || cyclonedx-bom -o sbom.json 2>/dev/null || echo "SBOM generation skipped (tool not available)"

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: ignore
