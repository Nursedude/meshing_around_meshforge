# ==========================================================================
# Mosquitto Listener: Allow connections from all interfaces
# ==========================================================================
# By default Mosquitto only listens on localhost (127.0.0.1).
# WiFi radios and LAN devices need to reach the broker on a routable IP.
#
# Install:
#   sudo cp templates/mosquitto-listener.conf /etc/mosquitto/conf.d/
#   sudo systemctl restart mosquitto
#
# Verify:
#   ss -tlnp | grep 1883    # should show 0.0.0.0:1883
# ==========================================================================

listener 1883 0.0.0.0
allow_anonymous true
