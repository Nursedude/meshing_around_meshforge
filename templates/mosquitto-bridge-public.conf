# ==========================================================================
# Mosquitto Bridge: Meshtastic Public Broker (receive-only)
# ==========================================================================
# Bridges local Mosquitto to mqtt.meshtastic.org so mesh_client can read
# public mesh traffic via localhost:1883 without direct internet dependency.
#
# SAFETY: Direction is 'in' only — local broker will NEVER publish back
# to the public broker.  This is receive-only by design.
#
# Install:
#   sudo cp templates/mosquitto-bridge-public.conf /etc/mosquitto/conf.d/
#   sudo systemctl restart mosquitto
#   sudo tail -20 /var/log/mosquitto/mosquitto.log   # verify bridge connects
#
# Verify traffic:
#   mosquitto_sub -t 'msh/US/#' -v -C 3
#
# To change region, edit the topic line below (e.g., msh/EU/# for Europe).
# ==========================================================================

connection meshtastic-public
address mqtt.meshtastic.org:1883
remote_username meshdev
remote_password large4cats

# Subscribe to public traffic, do NOT publish back
# 'in' = remote -> local only, never local -> remote
topic msh/US/# in 1

# Reconnect settings
start_type automatic
try_private false
cleansession true
keepalive_interval 60
restart_timeout 10
