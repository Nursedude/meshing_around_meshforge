# ==========================================================================
# MeshForge Regional Profile: US Default
# ==========================================================================
# Standard configuration for continental United States.
# Uses the public Meshtastic MQTT broker with US topic root.
# Add your own channels in mesh_client.ini after applying.
#
# IMPORTANT: auto_respond is OFF. The public Meshtastic MQTT broker
# must never have bots responding on it.
#
# Usage: python3 mesh_client.py --profile default_us
# ==========================================================================

[profile]
name = US Default
description = Continental United States - standard configuration
region = US
topic_root = msh/US
recommended_hardware = TBEAM,RAK4631,HELTEC,TLORA

[interface]
# US Default: MQTT recommended for monitoring public mesh
# For direct radio: type = serial (port auto-detected)
# For remote device: type = tcp, hostname = <device-ip>
type = mqtt

[mqtt]
broker = mqtt.meshtastic.org
port = 1883
topic_root = msh/US
channel = LongFast
channels = LongFast
use_tls = false
username = meshdev
password = large4cats
qos = 1

[alerts]
enabled = true
emergency_keywords = emergency,911,sos,mayday

[commands]
enabled = true
auto_respond = false
commands = cmd,help,ping,info,nodes,status,version,uptime,weather

[display]
time_format = 12h
show_timestamps = true
show_snr = true
show_battery = true

[data_sources]
# NOAA Weather - set your station code after applying
weather_enabled = false
weather_station =
weather_zone =
