# ==========================================================================
# MeshForge Regional Bot Config: Hawaii
# ==========================================================================
# Complete meshing-around bot configuration for Hawaiian Islands.
# ALL fields from config.template included — Hawaii-relevant values pre-filled.
#
# Usage:
#   1. In TUI Config Editor: press [P] to apply this profile
#   2. Or copy directly: cp profiles/hawaii_bot.ini /opt/meshing-around/config.ini
#
# After applying, review and customize values marked with "# <-- SET THIS"
# ==========================================================================

[profile]
name = Hawaii Bot Config
description = Complete bot configuration for Hawaiian Islands mesh networks
region = US/HI

# type can be serial, tcp, or ble
# port is the serial port to use
# hostname is the IP/DNS for tcp type default is host:4403

[interface]
type = tcp
port = /dev/ttyACM0
hostname = localhost
# mac = 00:11:22:33:44:55

# Additional interface for multi radio support
[interface2]
enabled = False
type = serial
port = /dev/ttyUSB0
# hostname = localhost
# mac = 00:11:22:33:44:55

[general]
respond_by_dm_only = False
autopinginchannel = False
defaultchannel = 0
ignoredefaultchannel = True
ignorechannels =
cmdbang = False
explicitcmd = True
favoritenodelist =
motd = Mahalo for using HawaiiNet! A hui hou.
welcome_message = Nurse Dude, here for you like a friend who is not. Try sending: ping @foo or, cmd
whoami = True
dadjokes = True
dadjokesemoji = True
spaceweather = True
rssenable = True
rssfeedurl = http://www.hackaday.com/rss.xml,http://rss.slashdot.org/Slashdot/slashdotMain,http://www.reddit.com/r/meshtastic/.rss
rssfeednames = default,slashdot,mesh
rssmaxitems = 3
rsstruncate = 100
enablenewsapi = False
newsapi_key =
newsapiregion = us
sort_by = relevancy
wikipedia = True
usekiwixserver = False
kiwixurl = http://127.0.0.1:8080
kiwixlibraryname = wikipedia_en_100_nopic_2025-09
ollama = False
ollamamodel = gemma3:latest
ollamahostname = http://localhost:11434
useopenwebui = False
openwebuiurl = http://localhost:3000
openwebuiapikey =
rawllmquery = True
llmreplytononcommands = True
llmusewikicontext = False
storeforward = True
storelimit = 4
reversesf = False
enablecmdhistory = True
lheardcmdignorenodes =
zulutime = False
urltimeout = 10
logmessagestofile = False
syslogtofile = True
sysloglevel = DEBUG
log_backup_count = 32
dont_retry_disconnect = False
enableecho = False
echochannel = 9

[emergencyHandler]
enabled = True
alert_channel = 2
alert_interface = 1

[sentry]
sentryenabled = True
sentryinterface = 1
sentrychannel = 9
emailsentryalerts = False
detectionsensoralert = False
sentryignorelist =
sentrywatchlist =
sentryradius = 100
sentryholdoff = 2
cmdshellsentryalerts = False
sentryalertnear = sentry_alert_near.sh
sentryalertaway = sentry_alert_away.sh
highflyingalert = True
highflyingalertaltitude = 5000
highflyopenskynetwork = True
highflyingalertinterface = 1
highflyingalertchannel = 2
highflyingignorelist =

[bbs]
enabled = True
bbs_ban_list =
bbs_admin_list =
bbslink_enabled = False
bbslink_whitelist =
bbsapi_enabled = False

[location]
enabled = True
# Big Island coordinates — change for your island
# Oahu: lat=21.3069 lon=-157.8583  Maui: lat=20.7984 lon=-156.3319
# Kauai: lat=22.0964 lon=-159.5261  Molokai: lat=21.1333 lon=-157.0167
lat = 19.6227
lon = -155.0374
fuzzconfiglocation = True
fuzzitall = False
usemetric = False
repeaterlookup = rbook

# Satellite pass prediction — register free at https://www.n2yo.com/login/
n2yoapikey =
satlist = 25544,7530

# Use Open-Meteo API (useful alongside NOAA for backup)
usemeteowxapi = True
noaaforecastduration = 3
noaaalertcount = 2

# NOAA Weather EAS Alert Broadcast — enabled for Hawaii storm/tsunami alerts
wxalertbroadcastenabled = True
ignoreeasenable = False
ignoreeaswords = test
enableextralocationwx = True

# NOAA Coastal Waters — Hawaii coastal zone
# ph = Honolulu HI region. Zones: phz110=Kauai, phz114=Oahu, phz118=Maui
# phz119=Molokai, phz120=Lanai, phz121=Kahoolawe, phz122=Big Island
coastalenabled = True
mycoastalzone = https://tgftp.nws.noaa.gov/data/forecasts/marine/coastal/ph/phz122.txt
coastalforecastdays = 10

# USGS river gauges — 16704000 is Wailuku River at Piihonua, HI
# Find more at https://waterdata.usgs.gov
riverlist = 16704000

# FEMA IPAWS alerts — Hawaii FIPS codes
# 15001=Hawaii County, 15003=Honolulu, 15007=Kauai, 15009=Maui
ipawsalertenabled = True
myfipslist = 15001,15003

# SAME codes for Hawaii — find yours at https://www.weather.gov/nwr/counties
# 015001=Hawaii, 015003=Honolulu, 015007=Kauai, 015009=Maui
mysamelist = 015001,015003

# FEMA headline filter
ignorefemaenable = True
ignorefemawords = test,exercise

# USGS Volcano alerts — critical for Hawaii (Kilauea, Mauna Loa)
volcanoalertbroadcastenabled = True
ignoreusgsenable = False
ignoreusgswords = test

# Germany/DE alerts (not applicable for Hawaii)
enabledealerts = False
myregionalkeysde = 110000000000,120510000000

# Alert broadcast channel (duplicates to this channel if set)
ealertbroadcastch = 1

[checklist]
enabled = True
checklist_db = data/checklist.db
reverse_in_out = False
auto_approve = True

[inventory]
enabled = False
inventory_db = data/inventory.db
disable_penny = False

[qrz]
enabled = True
qrz_db = data/qrz.db
qrz_hello_string = "Aloha! DM for more info."
training = True

[repeater]
enabled = False
repeater_channels =

[scheduler]
enabled = False
interface = 1
channel = 2
message = "Aloha from HawaiiNet! DM for more info."
schedulermotd = False
value =
interval =
time =

[radioMon]
dxspotter_enabled = True
sigwatchbroadcastinterface = 1
sigwatchbroadcastch = 2
enabled = False
rigcontrolserveraddress = 127.0.0.1:4532
signaldetectionthreshold = -10
signalholdtime = 10
signalcooldown = 5
signalcyclelimit = 5
voxdetectionenabled = False
voxdescription = VOX
uselocalvoxmodel = False
voxlanguage = en-us
voxinputdevice = default
voxontraplist = True
voxtraplist = chirpy
voxenablecmd = True
meshagestts = False
ttschannels = 3
wsjtxdetectionenabled = False
wsjtxudpserveraddress = 127.0.0.1:2237
wsjtxwatchedcallsigns =
js8calldetectionenabled = False
js8callserveraddress = 127.0.0.1:2442
js8callwatchedcallsigns =

[fileMon]
filemon_enabled = True
file_path = alert.txt
broadcastch = 1
enable_read_news = True
news_file_path = news.txt
news_random_line = False
news_block_mode = True
enable_runshellcmd = True
allowxcmd = False
