# ==========================================================================
# MeshForge Regional Profile: Hawaii
# ==========================================================================
# Regional defaults for Hawaiian Islands.
# Sets topic root, emergency keywords relevant to Hawaii hazards,
# and display preferences. Channels are left minimal — add your own
# local channels (lab, community, etc.) in mesh_client.ini after applying.
#
# IMPORTANT: auto_respond is OFF. The public Meshtastic MQTT broker
# must never have bots responding on it. Only enable auto_respond on
# your own private/local broker.
#
# Usage: python3 mesh_client.py --profile hawaii
# ==========================================================================

[profile]
name = Hawaii
description = Hawaiian Islands - regional keywords and settings
region = US
topic_root = msh/US
recommended_hardware = RAK4631,TBEAM,HELTEC,STATION_G2

[mqtt]
broker = mqtt.meshtastic.org
port = 1883
topic_root = msh/US
channel = LongFast
channels = LongFast
use_tls = false
username = meshdev
password = large4cats
qos = 1

[alerts]
enabled = true
emergency_keywords = emergency,911,sos,mayday,tsunami,hurricane,lava,evacuation,shelter

[commands]
enabled = true
# NEVER enable auto_respond on public MQTT brokers
auto_respond = false
commands = cmd,help,ping,info,nodes,status,version,uptime,weather,tsunami

[display]
time_format = 12h
show_timestamps = true
show_snr = true
show_battery = true

[data_sources]
# NOAA Pacific Tsunami Warning Center
tsunami_enabled = true
tsunami_url = https://www.tsunami.gov/events/xml/PAAQAtom.xml
tsunami_region = pacific

# NOAA Weather - set your station code (e.g., HNL for Honolulu)
weather_enabled = true
weather_station =
weather_zone =

# Volcano alerts - Hawaiian Volcano Observatory
volcano_enabled = true
volcano_url = https://volcanoes.usgs.gov/vsc/api/volcanoApi/

[notes]
# Hawaiian Islands mesh notes:
# - Long ocean paths between islands benefit from high-power nodes (STATION_G2)
# - RAK4631 recommended for solar-powered remote repeaters
# - Volcanic terrain creates RF shadows - plan node placement carefully
# - Tsunami and hurricane alerts are critical for island safety
# - Add your own channels (lab, community) to mesh_client.ini after applying
# - Consider elevation: Mauna Kea/Haleakala sites have exceptional range
# - Set weather_station and weather_zone in mesh_client.ini for your location
