# ==========================================================================
# MeshForge Regional Profile: Hawaii
# ==========================================================================
# Regional defaults for Hawaiian Islands mesh networks.
# Sets topic root, emergency keywords, Hawaii data sources, and display
# preferences. Channels are left minimal — add your own local channels
# (lab, community, etc.) in mesh_client.ini after applying.
#
# For upstream bot config (meshing-around config.ini), see hawaii_bot.ini
# or use [P] in the TUI Config Editor to apply the Hawaii bot profile.
#
# IMPORTANT: auto_respond is OFF. The public Meshtastic MQTT broker
# must never have bots responding on it. Only enable auto_respond on
# your own private/local broker.
#
# Usage: python3 mesh_client.py --profile hawaii
# ==========================================================================

[profile]
name = Hawaii
description = Hawaiian Islands - complete regional profile
region = US
topic_root = msh/US/HI
recommended_hardware = RAK4631,TBEAM,HELTEC,STATION_G2,PI_HAT

[interface]
# Hawaii: MQTT recommended for monitoring public mesh
# For direct radio: type = serial (port auto-detected)
# For remote Pi: type = tcp, hostname = <your-pi-ip>
type = mqtt

[mqtt]
broker = mqtt.meshtastic.org
port = 1883
topic_root = msh/US/HI
channel = LongFast
# All AQ== presets — widen subscription so the TUI surfaces traffic from
# every standard channel under the Hawaii topic root, not just LongFast.
channels = LongFast,MediumFast,MediumSlow,ShortFast,ShortSlow,ShortTurbo,LongModerate,LongSlow
use_tls = false
username = meshdev
password = large4cats
qos = 1

[features]
alerts_enabled = true
location_enabled = true
telemetry_enabled = true
nodes_enabled = true
messages_enabled = true

[alerts]
enabled = true
emergency_enabled = true
emergency_keywords = emergency,911,sos,mayday,tsunami,hurricane,lava,evacuation,shelter,vog,flood,fire,landslide
battery_alerts = true
battery_threshold = 20
new_node_alerts = true
disconnect_alerts = true
disconnect_timeout = 3600
log_alerts = true

[commands]
enabled = true
# NEVER enable auto_respond on public MQTT brokers
auto_respond = false
commands = cmd,help,ping,info,nodes,status,version,uptime,weather,tsunami,volcano

[network]
default_channel = 0
message_history = 200

[display]
time_format = 12h
show_timestamps = true
show_snr = true
show_battery = true
show_node_ids = false
show_position = true
node_name_style = long

[data_sources]
# NOAA Pacific Tsunami Warning Center
tsunami_enabled = true
tsunami_url = https://www.tsunami.gov/events/xml/PAAQAtom.xml
tsunami_region = pacific

# NOAA Weather — set your station code for your island
# HNL=Honolulu  ITO=Hilo  OGG=Kahului  LIH=Lihue  MKK=Molokai  LNY=Lanai
weather_enabled = true
weather_station = HNL
# NWS zones: HIZ001=Kauai, HIZ012=Oahu South, HIZ023=Big Island East
# Full list: https://alerts.weather.gov/cap/hi.php?x=1
weather_zone = HIZ023

# Volcano alerts - Hawaiian Volcano Observatory (Kilauea/Mauna Loa)
volcano_enabled = true
volcano_url = https://volcanoes.usgs.gov/hans-public/api/volcano/getCapElevated
volcano_lat = 19.5
volcano_lon = -155.5

[logging]
enabled = true
level = INFO

[notes]
# Hawaiian Islands mesh notes:
# - Long ocean paths between islands benefit from high-power nodes (STATION_G2)
# - RAK4631 recommended for solar-powered remote repeaters
# - Volcanic terrain creates RF shadows - plan node placement carefully
# - Tsunami and hurricane alerts are critical for island safety
# - Consider elevation: Mauna Kea/Haleakala sites have exceptional range
#
# Upstream bot config (meshing-around config.ini) hints:
# - Use profiles/hawaii_bot.ini for a complete bot config with Hawaii values
# - Or in TUI Config Editor press [P] to apply the Hawaii bot profile
# - Key settings: [location] mycoastalzone should use ph/ (Honolulu) zone
#   e.g. https://tgftp.nws.noaa.gov/data/forecasts/marine/coastal/ph/phz122.txt
# - Hawaii FIPS: 15001=Hawaii, 15003=Honolulu, 15007=Kauai, 15009=Maui
# - Hawaii SAME: 015001, 015003, 015007, 015009
