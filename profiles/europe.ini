# ==========================================================================
# MeshForge Regional Profile: Europe (868 MHz)
# ==========================================================================
# Pre-configured for European mesh networks using the 868 MHz band.
# EU duty-cycle regulations apply.
#
# IMPORTANT: auto_respond is OFF on public brokers.
#
# Usage: python3 mesh_client.py --profile europe
# ==========================================================================

[profile]
name = Europe (868 MHz)
description = European Union and UK - 868 MHz band
region = EU_868
topic_root = msh/EU_868
recommended_hardware = TBEAM,RAK4631,HELTEC,TLORA

[mqtt]
broker = mqtt.meshtastic.org
port = 1883
topic_root = msh/EU_868
channel = LongFast
channels = LongFast
use_tls = false
username = meshdev
password = large4cats
qos = 1

[alerts]
enabled = true
emergency_keywords = emergency,112,sos,mayday

[commands]
enabled = true
auto_respond = false
commands = cmd,help,ping,info,nodes,status,version,uptime,weather

[display]
time_format = 24h
show_timestamps = true
show_snr = true
show_battery = true

[data_sources]
weather_enabled = false
weather_station =

[notes]
# European mesh notes:
# - 868 MHz band has duty-cycle restrictions (1% or 10% depending on sub-band)
# - Emergency number is 112 (pan-European)
# - Consider LORA_24 (2.4 GHz) for higher bandwidth where legal
