# ==========================================================================
# MeshForge Regional Profile: Local Broker
# ==========================================================================
# Configuration for running with a local Mosquitto MQTT broker.
# No internet dependency - ideal for private meshes and field deployments.
#
# auto_respond is ON here because this is a private broker.
# This is the ONLY profile where auto_respond should be enabled.
#
# Usage: python3 mesh_client.py --profile local_broker
# ==========================================================================

[profile]
name = Local Broker
description = Local Mosquitto broker - private mesh, bot responses enabled
region = US
topic_root = msh/US
recommended_hardware = TBEAM,RAK4631,HELTEC,STATION_G2,PI_HAT

[interface]
# Local broker: typically running alongside meshtasticd
# TCP to local meshtasticd for radio access
type = tcp
hostname = 127.0.0.1

[mqtt]
broker = localhost
port = 1883
topic_root = msh/US
channel = LongFast
channels = *
use_tls = false
username =
password =
qos = 1

[alerts]
enabled = true
emergency_keywords = emergency,911,sos,mayday

[commands]
enabled = true
# auto_respond is safe on private/local brokers only
auto_respond = true
commands = cmd,help,ping,info,nodes,status,version,uptime,weather

[display]
time_format = 24h
show_timestamps = true
show_snr = true
show_battery = true

[data_sources]
weather_enabled = false
weather_station =

[notes]
# Local broker notes:
# - Requires Mosquitto installed: sudo apt install mosquitto mosquitto-clients
# - No internet needed - works fully offline
# - auto_respond is safe here (private broker, your mesh only)
# - No authentication required for localhost connections
# - Ideal for field exercises, events, and private mesh networks
# - channels = * subscribes to ALL channels under topic_root (recommended
#   for local brokers where channel names depend on radio configuration)
# - To limit to specific channels: channels = LongFast,meshforge,2
