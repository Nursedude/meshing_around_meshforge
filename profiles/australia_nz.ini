# ==========================================================================
# MeshForge Regional Profile: Australia / New Zealand
# ==========================================================================
# Pre-configured for ANZ mesh networks.
#
# IMPORTANT: auto_respond is OFF on public brokers.
#
# Usage: python3 mesh_client.py --profile australia_nz
# ==========================================================================

[profile]
name = Australia / New Zealand
description = Australia and New Zealand mesh networks
region = ANZ
topic_root = msh/ANZ
recommended_hardware = RAK4631,TBEAM,HELTEC

[interface]
# ANZ: MQTT recommended for monitoring public mesh
# For direct radio: type = serial (port auto-detected)
# For remote device: type = tcp, hostname = <device-ip>
type = mqtt

[mqtt]
broker = mqtt.meshtastic.org
port = 1883
topic_root = msh/ANZ
channel = LongFast
channels = LongFast
use_tls = false
username = meshdev
password = large4cats
qos = 1

[alerts]
enabled = true
emergency_keywords = emergency,000,111,sos,mayday,bushfire,cyclone

[commands]
enabled = true
auto_respond = false
commands = cmd,help,ping,info,nodes,status,version,uptime,weather

[display]
time_format = 24h
show_timestamps = true
show_snr = true
show_battery = true

[data_sources]
weather_enabled = false
weather_station =

[notes]
# ANZ mesh notes:
# - Emergency: 000 (AU), 111 (NZ)
# - Bushfire and cyclone alerts are critical
# - Vast distances - high-power nodes and repeaters essential
# - Solar-powered RAK4631 nodes ideal for remote outback repeaters
